server:
  port: 8082

# Client-credentials token used by TokenService as the "actor_token" when
# exchanging an incoming (already delegated) access token to add mcp-server
# as an additional actor. Reuses the mcp-server-client registration.
mcp:
  service-token:
    token-uri: http://localhost:9000/oauth2/token
    client-id: mcp-server-client
    client-secret: mcp-server-secret
    scope: mcp.tools

spring:
  ai:
    mcp:
      server:
        name: demo-mcp-server
        version: 0.0.1
        protocol: STREAMABLE
        enabled: true
        streamable-http:
          mcp-endpoint: /api/mcp
          keep-alive-interval: 30s

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9000/oauth2/jwks
          issuer-uri: http://localhost:9000
          audiences: mcp-audience

### for STDIO
---
spring:
  config:
    activate:
      on-profile:
        stdio

  ai:
    mcp:
      server:
        stdio: true

  main:
    banner-mode: off
    web-application-type: none

logging.pattern.console:
logging.file.name: mcp-server.log