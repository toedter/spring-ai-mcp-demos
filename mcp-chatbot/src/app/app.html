<header class="toolbar">
  <span class="toolbar-title">🤖 MCP Chatbot</span>
  <span class="spacer"></span>
  @if (auth.loggedIn()) {
    <div class="user-menu">
      <button class="avatar-btn" (click)="toggleMenu($event)" title="Account">
        <span class="avatar">{{ initials() }}</span>
      </button>
      @if (menuOpen()) {
        <div class="menu" (click)="$event.stopPropagation()">
          <div class="menu-info">
            <span class="menu-name">{{ auth.user()?.name }}</span>
            <span class="menu-email">{{ auth.user()?.email }}</span>
          </div>
          <div class="menu-separator"></div>
          <button class="menu-action" (click)="logout()">
            <span class="menu-action-icon">⎋</span> Logout
          </button>
        </div>
      }
    </div>
  } @else {
    <button class="btn" (click)="login()">Login</button>
  }
</header>
<main class="content">
  @if (auth.loggedIn()) {
    <div class="chat-wrap">
      <deep-chat
        class="chat"
        [connect]="connectConfig()"
        [stream]="true"
        [introMessage]="introMessage"
        [textInput]="textInput"
        style="width: 100%; height: 100%; border: none; border-radius: 0; background-color: #fff;">
      </deep-chat>
    </div>
  } @else {
    <section class="login-hint">
      <h1>Welcome to the MCP Chatbot</h1>
      <p>Please sign in to connect to the MCP client and start chatting.</p>
      <button class="btn primary" (click)="login()">Sign in</button>
      <p class="hint">Demo user: <code>john&#64;doe.com</code> / <code>john</code></p>
    </section>
  }
</main>
